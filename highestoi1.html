            position: fixed; top: 80px; right: 20px; width: 450px;

    <script>
        // --- Live TV Logic ---
        let hlsStream = null;

        function openTV() {
            const tvDiv = document.getElementById('tvContainer');
            const video = document.getElementById('tvVideo');
            tvDiv.style.display = 'block';

            const videoSrc = 'https://n18syndication.akamaized.net/bpk-tv/CNBC_Tv18_Prime_HD_NW18_MOB/output01/index.m3u8';

            if (Hls.isSupported()) {
                if(hlsStream) hlsStream.destroy();
                hlsStream = new Hls();
                hlsStream.loadSource(videoSrc);
                hlsStream.attachMedia(video);
                hlsStream.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log("Autoplay blocked."));
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        function closeTV() {
            document.getElementById('tvContainer').style.display = 'none';
            document.getElementById('tvVideo').pause();
            if(hlsStream) {
                hlsStream.destroy();
                hlsStream = null;
            }
        }

        dragElement(document.getElementById("tvContainer"));

        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById("tvHeader")) {
                document.getElementById("tvHeader").onmousedown = dragMouseDown;
            } else {
                elmnt.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

, 'NSE:BOSCHLTD-EQ', 'NSE:ASTRAL-EQ', 'NSE:MFSL-EQ', 'NSE:MCX-EQ', 'NSE:ALKEM-EQ', 'NSE:HDFCAMC-EQ', 'NSE:PIIND-EQ', 'NSE:PAGEIND-EQ', 'NSE:MANKIND-EQ', 'NSE:CDSL-EQ', 'NSE:BALKRISIND-EQ', 'NSE:COROMANDEL-EQ', 'NSE:GLENMARK-EQ', 'NSE:IDFCFIRSTB-EQ', 'NSE:AUBANK-EQ', 'NSE:DALBHARAT-EQ', 'NSE:SBICARD-EQ', 'NSE:GODREJPROP-EQ', 'NSE:HAVELLS-EQ', 'NSE:LTTS-EQ', 'NSE:MARICO-EQ', 'NSE:SHREECEM-EQ', 'NSE:SYNGENE-EQ', 'NSE:TIINDIA-EQ', 'NSE:UBL-EQ', 'NSE:UNIONBANK-EQ', 'NSE:UPL-EQ', 'NSE:AMBUJACEM-EQ', 'NSE:ACC-EQ', 'NSE:ATGL-EQ', 'NSE:AWL-EQ', 'NSE:BANDHANBNK-EQ', 'NSE:BANKINDIA-EQ', 'NSE:BERGEPAINT-EQ', 'NSE:BIOCON-EQ', 'NSE:CROMPTON-EQ', 'NSE:DABUR-EQ', 'NSE:DEEPAKNTR-EQ', 'NSE:DRREDDY-EQ', 'NSE:EXIDEIND-EQ', 'NSE:FORTIS-EQ', 'NSE:GRANULES-EQ', 'NSE:GUJGASLTD-EQ', 'NSE:HDFCLIFE-EQ', 'NSE:ICICIGI-EQ', 'NSE:IEX-EQ', 'NSE:IGL-EQ', 'NSE:INDUSINDBK-EQ', 'NSE:INDUSTOWER-EQ', 'NSE:IPCALAB-EQ', 'NSE:JKCEMENT-EQ', 'NSE:JUBLFOOD-EQ', 'NSE:LALPATHLAB-EQ', 'NSE:LAURUSLABS-EQ', 'NSE:LICHSGFIN-EQ', 'NSE:MGL-EQ', 'NSE:MRF-EQ', 'NSE:NATIONALUM-EQ', 'NSE:NAUKRI-EQ', 'NSE:PEL-EQ', 'NSE:PPLPHARMA-EQ', 'NSE:RAMCOCEM-EQ', 'NSE:SAIL-EQ', 'NSE:SBILIFE-EQ', 'NSE:SRF-EQ', 'NSE:TATACHEM-EQ', 'NSE:TORNTPOWER-EQ', 'NSE:UNITDSPR-EQ'];

        // --- SHARED AUTH SYNC ENGINE ---
        function checkGlobalAuth() {
            const sharedToken = localStorage.getItem('fyers_shared_token');
            const sharedAppId = localStorage.getItem('fyers_shared_appid');

            if (sharedToken && sharedAppId) {
                accessToken = sharedToken;
                globalAppId = sharedAppId;
                
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('dataCard').style.display = 'block';
                
                console.log("🚀 Auto-Authenticated using Shared Session");
                startOIScan(); 
                startLTPPolling();
            }
        }

        window.onload = () => {
            checkGlobalAuth();
            document.getElementById('appId').value = localStorage.getItem('fyers_appId') || '';
            document.getElementById('secretId').value = localStorage.getItem('fyers_secretId') || '';
        };

        window.addEventListener('storage', (event) => {
            if (event.key === 'fyers_shared_token') {
                location.reload(); 
            }
        });

        document.getElementById('chartModal').addEventListener('hidden.bs.modal', function () {
            activeChartSymbol = null;
            if (chartRefreshInterval) clearInterval(chartRefreshInterval);
            document.getElementById('liveChartIndicator').style.display = 'none';
        });

        function generateAuthUrl() {
            const id = document.getElementById('appId').value.trim();
            if(!id) return alert("Enter App ID.");
            const url = `https://api-t1.fyers.in/api/v3/generate-authcode?client_id=${id}&redirect_uri=https://trade.fyers.in/api-login/redirect-uri/index.html&response_type=code&state=sample`;
            window.open(url, '_blank');
        }

        async function login() {
            const appId = document.getElementById('appId').value.trim();
            const secret = document.getElementById('secretId').value.trim();
            const code = document.getElementById('authCode').value.trim();
            localStorage.setItem('fyers_appId', appId);
            localStorage.setItem('fyers_secretId', secret);
            try {
                const hash = CryptoJS.SHA256(`${appId}:${secret}`).toString();
                const res = await axios.post('https://api-t1.fyers.in/api/v3/validate-authcode', { grant_type: 'authorization_code', appIdHash: hash, code: code });
                accessToken = res.data.access_token;
                globalAppId = appId;

                // SET SHARED SESSION
                localStorage.setItem('fyers_shared_token', accessToken);
                localStorage.setItem('fyers_shared_appid', globalAppId);

                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('dataCard').style.display = 'block';
                startOIScan(); startLTPPolling();
            } catch (e) { alert("Initialization Failed."); }
        }

        async function showChart(symbol) {
            const data = stockData[symbol];
            activeChartSymbol = symbol;
            const modalTitle = document.getElementById('modalTitle');
            const loader = document.getElementById('chartLoader');
            const container = document.getElementById('chartContainer');
            modalTitle.textContent = `Analyzing ${symbol.split(':')[1]}...`;
            loader.style.display = 'block';
            if (tvChart) { try { tvChart.remove(); } catch(e) {} tvChart = null; }
            container.innerHTML = '';
            const myModal = new bootstrap.Modal(document.getElementById('chartModal'));
            myModal.show();

            setTimeout(async () => {
                try {
                    tvChart = LightweightCharts.createChart(container, {
                        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
                        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
                        timeScale: { timeVisible: true, borderColor: '#2a2e39' },
                    });
                    candleSeries = tvChart.addCandlestickSeries({ upColor: '#089981', downColor: '#f23645' });
                    const to = Math.floor(Date.now() / 1000);
                    const from = to - (86400 * 5);
                    const res = await axios.get(`https://api-t1.fyers.in/data/history?symbol=${symbol.replace(/&/g, '%26')}&resolution=15&date_format=0&range_from=${from}&range_to=${to}&cont_flag=1`, {
                        headers: { 'Authorization': `${globalAppId}:${accessToken}` }
                    });
                    if (res.data.s === "ok" && res.data.candles && res.data.candles.length > 0) {
                        let formatted = res.data.candles.map(c => ({
                            time: c[0] + 19800, open: c[1], high: c[2], low: c[3], close: c[4]
                        })).sort((a,b) => a.time - b.time);
                        formatted = formatted.filter((v, i, a) => i === 0 || v.time !== a[i-1].time);
                        candleSeries.setData(formatted);
                        candleSeries.createPriceLine({ price: data.ce, color: '#f23645', lineWidth: 2, axisLabelVisible: true, title: 'RES (CE)' });
                        candleSeries.createPriceLine({ price: data.pe, color: '#089981', lineWidth: 2, axisLabelVisible: true, title: 'SUP (PE)' });
                        tvChart.timeScale().fitContent();
                        modalTitle.textContent = `${symbol.split(':')[1]} - 15m Live Chart`;
                        loader.style.display = 'none';
                        document.getElementById('liveChartIndicator').style.display = 'block';
                        startChartAutoRefresh();
                    } else { loader.textContent = "Data Unavailable"; }
                } catch (e) { loader.textContent = `API Error`; }
            }, 600);
        }

        function startChartAutoRefresh() {
            if (chartRefreshInterval) clearInterval(chartRefreshInterval);
            chartRefreshInterval = setInterval(async () => {
                if (!activeChartSymbol || !candleSeries) return;
                const to = Math.floor(Date.now() / 1000);
                const from = to - 86400; 
                try {
                    const res = await axios.get(`https://api-t1.fyers.in/data/history?symbol=${activeChartSymbol.replace(/&/g, '%26')}&resolution=15&date_format=0&range_from=${from}&range_to=${to}&cont_flag=1`, {
                        headers: { 'Authorization': `${globalAppId}:${accessToken}` }
                    });
                    if (res.data.s === "ok" && res.data.candles && res.data.candles.length > 0) {
                        const last = res.data.candles[res.data.candles.length - 1];
                        candleSeries.update({ time: last[0] + 19800, open: last[1], high: last[2], low: last[3], close: last[4] });
                    }
                } catch (e) { }
            }, 3000); 
        }

        async function startOIScan() {
            while(true) {
                for (let i = 0; i < stocks.length; i++) {
                    await fetchOI(stocks[i]);
                    await new Promise(r => setTimeout(r, 200)); 
                }
                await new Promise(r => setTimeout(r, 60000));
            }
        }

        async function fetchOI(symbol) {
            try {
                const res = await axios.get(`https://api-t1.fyers.in/data/options-chain-v3?symbol=${symbol.replace(/&/g, '%26')}&strikecount=50`, {
                    headers: { 'Authorization': `${globalAppId}:${accessToken}` }
                });
                if (res.data?.data?.optionsChain) {
                    const chain = res.data.data.optionsChain;
                    const ce = chain.filter(o => o.option_type === "CE").sort((a,b) => b.oi - a.oi)[0].strike_price;
                    const pe = chain.filter(o => o.option_type === "PE").sort((a,b) => b.oi - a.oi)[0].strike_price;
                    stockData[symbol] = { ce, pe, ltp: stockData[symbol]?.ltp || 0 };
                    renderRow(symbol);
                }
            } catch (e) { }
        }

        function renderRow(symbol) {
            const id = symbol.replace(/\W/g, '_');
            const tbody = document.getElementById('oiTableBody');
            if (!document.getElementById(`row-${id}`)) {
                const tr = document.createElement('tr');
                tr.id = `row-${id}`;
                tbody.appendChild(tr);
            }
            updateRowUI(symbol);
        }

        async function startLTPPolling() {
            setInterval(async () => {
                const chunkSize = 50;
                for (let i = 0; i < stocks.length; i += chunkSize) {
                    const chunk = stocks.slice(i, i + chunkSize);
                    try {
                        const res = await axios.get(`https://api-t1.fyers.in/data/quotes?symbols=${chunk.join(',').replace(/&/g, '%26')}`, {
                            headers: { 'Authorization': `${globalAppId}:${accessToken}` }
                        });
                        if (res.data.d) {
                            res.data.d.forEach(item => {
                                if (stockData[item.n]) {
                                    stockData[item.n].ltp = item.v.lp;
                                    updateRowUI(item.n);
                                }
                            });
                        }
                    } catch (e) { }
                }
                filterTable(false);
            }, 3000);
        }

        function updateRowUI(symbol) {
            const id = symbol.replace(/\W/g, '_');
            const data = stockData[symbol];
            const row = document.getElementById(`row-${id}`);
            if (!row || !data) return;
            const ceGapVal = data.ltp ? Math.abs(((data.ce - data.ltp) / data.ltp) * 100) : 9999;
            const peGapVal = data.ltp ? Math.abs(((data.ltp - data.pe) / data.ltp) * 100) : 9999;
            const ceGapText = ceGapVal === 9999 ? '--' : ceGapVal.toFixed(2);
            const peGapText = peGapVal === 9999 ? '--' : peGapVal.toFixed(2);
            const ceAlertClass = ceGapVal <= 1 ? "glow-alert" : "";
            const peAlertClass = peGapVal <= 1 ? "glow-alert" : "";
            row.innerHTML = `
                <td class="text-start ps-4"><span class="symbol-clickable" onclick="showChart('${symbol}')">${symbol.split(':')[1].replace('-EQ','')}</span></td>
                <td class="ltp-box">${data.ltp || '--'}</td>
                <td class="res-strike">${data.ce}</td>
                <td class="fw-bold ${ceAlertClass}" style="color: var(--bearish)">${ceGapText}%</td>
                <td class="sup-strike">${data.pe}</td>
                <td class="fw-bold ${peAlertClass}" style="color: var(--bullish)">${peGapText}%</td>
            `;
            row.dataset.ceGap = ceGapVal;
            row.dataset.peGap = peGapVal;
        }

        function filterTable(autoSort = false) {
            const search = document.getElementById('searchInput').value.toUpperCase();
            const range = document.getElementById('proximityRange').value;
            const side = document.querySelector('input[name="sideFilter"]:checked').value;
            const rows = document.querySelectorAll('#oiTableBody tr');
            const rLimit = range === 'all' ? 9999 : parseFloat(range);
            rows.forEach(row => {
                const text = row.innerText.toUpperCase();
                const ceGap = parseFloat(row.dataset.ceGap);
                const peGap = parseFloat(row.dataset.peGap);
                let matchesSearch = text.includes(search);
                let matchesRange = true;
                if (side === 'ce') matchesRange = ceGap <= rLimit;
                else if (side === 'pe') matchesRange = peGap <= rLimit;
                else matchesRange = (ceGap <= rLimit || peGap <= rLimit);
                row.style.display = (matchesSearch && matchesRange) ? "" : "none";
            });
            if (autoSort) {
                if (side === 'ce') { sortDir.ceGap = 'asc'; sortTable('ceGap', true); }
                if (side === 'pe') { sortDir.peGap = 'asc'; sortTable('peGap', true); }
            }
        }

        function sortTable(type, forceAsc = false) {
            const tbody = document.getElementById("oiTableBody");
            const rows = Array.from(tbody.querySelectorAll("tr"));
            if (forceAsc) sortDir[type] = 'asc';
            const dir = sortDir[type] === 'asc' ? 1 : -1;
            rows.sort((a, b) => {
                const valA = parseFloat(a.dataset[type]);
                const valB = parseFloat(b.dataset[type]);
                return (valA - valB) * dir;
            });
            if (!forceAsc) sortDir[type] = sortDir[type] === 'asc' ? 'desc' : 'asc';
            rows.forEach(row => tbody.appendChild(row));
        }
    </script>
</body>
</html>
